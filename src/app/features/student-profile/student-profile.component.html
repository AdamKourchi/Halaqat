<ion-header>
  <ion-toolbar>
    <ion-title>الملف الشخصي للطالب</ion-title>
    <ion-button slot="end" fill="clear" (click)="back()">
      @if (isModal) {
        <ion-icon name="close"></ion-icon>
      } @else {
        <ion-icon name="arrow-back"></ion-icon>
      }
    </ion-button>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  @if (student) {

    <!-- ── Student Data Card ─────────────────────────────────────── -->
    <ion-card>
      <ion-card-header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
          <ion-card-title>بيانات الطالب</ion-card-title>
          <ion-button fill="clear" color="danger" (click)="confirmDeleteStudent()">
            <ion-icon name="trash" slot="start"></ion-icon>
            حذف
          </ion-button>
        </div>
      </ion-card-header>
      <ion-card-content>
        <ion-item>
          <ion-label position="stacked">الاسم</ion-label>
          <ion-input [(ngModel)]="student.name"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">الجنس</ion-label>
          <ion-select [(ngModel)]="student.gender" interface="popover">
            <ion-select-option value="Male">ذكر</ion-select-option>
            <ion-select-option value="Female">أنثى</ion-select-option>
          </ion-select>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">ولي الأمر</ion-label>
          <ion-input [(ngModel)]="student.parent_name" placeholder="اسم ولي الأمر"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">رقم ولي الأمر</ion-label>
          <ion-input dir="ltr" [(ngModel)]="student.parent_contact" placeholder="رقم الهاتف"></ion-input>
        </ion-item>
        <ion-item>
          <ion-label position="stacked">مشاكل صحية</ion-label>
          <ion-input
            [(ngModel)]="student.medical_issues"
            auto-grow
          ></ion-input>
        </ion-item>

        <!-- Save + Onboarding buttons side-by-side -->
        <div class="action-row" style="display:flex; gap:8px; margin-top:14px; justify-content:center;">
          <ion-button (click)="saveStudent()" fill="solid">
            <ion-icon name="save" slot="start"></ion-icon>
            حفظ
          </ion-button>
        </div>
      </ion-card-content>
    </ion-card>

    <!-- ── Mushaf Progress Visualizer ───────────────────────────── -->
    <div class="visualizer-section" style="margin-top: 8px;">
      <app-mushaf-visualizer [studentId]="student.id!"></app-mushaf-visualizer>
    </div>

  } @else {
    <div class="ion-text-center ion-padding">
      <p>جاري تحميل البيانات...</p>
    </div>
  }

</ion-content>
<ion-footer style="height: 50px;">
</ion-footer>
